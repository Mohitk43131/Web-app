<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard | Codiv Finance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f8f9fb;
    --surface: #ffffff;
    --surface2: #f0f2f7;
    --border: #e4e8f0;
    --text: #0f1117;
    --text2: #5a6072;
    --text3: #9aa0b4;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --emerald: #10b981;
    --emerald-light: #ecfdf5;
    --red: #ef4444;
    --red-light: #fef2f2;
    --amber: #f59e0b;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.06);
    --radius: 14px;
    --radius-sm: 8px;
    --radius-lg: 20px;
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1, h2, h3 { font-family: 'Syne', sans-serif; font-weight: 700; }
  
  /* ── AUTH SCREEN ── */
  .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f0f4ff 0%, #f8f9fb 60%, #e8f5f0 100%); padding: 20px; }
  .auth-card { background: var(--surface); border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
  .auth-logo { width: 52px; height: 52px; background: linear-gradient(135deg, #2563eb, #1d4ed8); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; margin: 0 auto 14px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .form-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: all var(--transition); }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all var(--transition); justify-content: center; text-decoration: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:hover { background: var(--border); }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .error-msg { color: var(--red); font-size: 13px; font-weight: 600; text-align: center; margin-top: 14px; min-height: 20px; }

  /* ── MAIN APP ── */
  .app-container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; display: none; }
  .header { margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { width: 48px; height: 48px; background: linear-gradient(135deg, #2563eb, #1d4ed8); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; }
  
  /* ── TABS ── */
  .tabs { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); transition: transform 0.2s ease; }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  
  /* ── PERSON/USER HEADERS ── */
  .person-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--surface2); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; font-family: 'Syne', sans-serif; overflow: hidden; flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .person-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .person-contact { font-size: 13px; color: var(--text3); margin-top: 2px; }
  
  /* ── BADGES ── */
  .badge { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-super { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
  .badge-admin { background: rgba(37, 99, 235, 0.15); color: var(--accent); }
  .badge-user { background: var(--surface2); color: var(--text2); }

  /* ── LEDGER STATS ── */
  .stats-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed var(--border); }
  .stat-col { display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; }
  .stat-val-sent { color: var(--red); font-weight: 700; font-size: 15px; }
  .stat-val-rec { color: var(--emerald); font-weight: 700; font-size: 15px; }
  
  .net-balance { margin-top: 16px; padding: 14px; border-radius: var(--radius-sm); text-align: center; }
  .net-positive { background: var(--emerald-light); color: #065f46; }
  .net-negative { background: var(--red-light); color: #991b1b; }
  .net-neutral { background: var(--surface2); color: var(--text2); }
  
  .net-label { font-size: 12px; font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .net-amount { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }

  .loader { text-align: center; padding: 40px; color: var(--text3); font-weight: 500; grid-column: 1 / -1; }
</style>
</head>
<body>

<div id="authScreen" class="auth-container">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:32px;">
      <div class="auth-logo">C</div>
      <h2 style="font-size:24px">Admin Access</h2>
      <p style="font-size:13px;color:var(--text3);margin-top:4px">Restricted dashboard area</p>
    </div>
    
    <div class="form-group">
      <label class="form-label">Admin Email</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="admin@domain.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="loginPassword" type="password" placeholder="Enter password"/>
    </div>
    
    <button class="btn btn-primary" id="loginBtn">Secure Login</button>
    <div id="loginError" class="error-msg"></div>
  </div>
</div>

<div id="appScreen" class="app-container">
  <div class="header">
    <div class="header-left">
      <div class="logo">C</div>
      <div>
        <h1 style="font-size: 28px;">Admin Dashboard</h1>
        <p style="color: var(--text2); font-size: 14px; margin-top: 4px;">Manage ledgers and system users</p>
      </div>
    </div>
    <button class="btn btn-secondary" style="width:auto; padding:8px 16px;" id="logoutBtn">Sign Out</button>
  </div>

  <div class="tabs">
    <button class="btn btn-primary" id="tabLedger" onclick="switchTab('ledger')">Ledger Balances</button>
    <button class="btn btn-secondary" id="tabUsers" onclick="switchTab('users')">System Users</button>
  </div>

  <div class="grid" id="balancesGrid">
    <div class="loader">Syncing secure data from Codiv Finance...</div>
  </div>

  <div class="grid" id="usersGrid" style="display:none;">
    <div class="loader">Loading system users...</div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhZb109hwM7lklWkJkc0BoBPnt499TjYg",
    authDomain: "web-finance-e1af7.firebaseapp.com",
    projectId: "web-finance-e1af7",
    databaseURL: "https://web-finance-e1af7-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  
  const SUPER_ADMIN = "mohitk43131@gmail.com";
  let isSuperAdmin = false;

  // UI Elements
  const authScreen = document.getElementById('authScreen');
  const appScreen = document.getElementById('appScreen');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const loginError = document.getElementById('loginError');

  // Tab switching globally accessible
  window.switchTab = function(tabName) {
    if (tabName === 'ledger') {
      document.getElementById('balancesGrid').style.display = 'grid';
      document.getElementById('usersGrid').style.display = 'none';
      document.getElementById('tabLedger').className = 'btn btn-primary';
      document.getElementById('tabUsers').className = 'btn btn-secondary';
    } else {
      document.getElementById('balancesGrid').style.display = 'none';
      document.getElementById('usersGrid').style.display = 'grid';
      document.getElementById('tabLedger').className = 'btn btn-secondary';
      document.getElementById('tabUsers').className = 'btn btn-primary';
    }
  };

  // Impersonate globally accessible
  window.impersonateUser = function(email, name) {
    if(!confirm(`Login to the main app as ${name} (${email})?`)) return;
    // Set a session flag that codiv-finance.html can read to override dashboard data
    sessionStorage.setItem('admin_impersonate', email);
    window.location.href = 'codiv-finance.html'; // Assuming this is your main app file name
  };

  const fmtNum = (n) => {
    n = Math.abs(Number(n) || 0);
    if(n >= 100000) return (n/100000).toFixed(2)+'L';
    if(n >= 1000) return (n/1000).toFixed(1)+'K';
    return n.toFixed(2);
  };

  // ── AUTHENTICATION ──
  onAuthStateChanged(auth, async (user) => {
    if(user) {
      const snap = await get(ref(db, `users/${user.uid}`));
      const data = snap.val() || {};
      
      const isAdmin = data.role === 'admin' || data.role === 'superadmin' || user.email === SUPER_ADMIN;
      isSuperAdmin = data.role === 'superadmin' || user.email === SUPER_ADMIN;
      
      if (isAdmin) {
        authScreen.style.display = 'none';
        appScreen.style.display = 'block';
        loadFinancialData();
        loadUsersData();
      } else {
        await signOut(auth);
        loginError.textContent = 'Access Denied: Admin privileges required.';
      }
    } else {
      authScreen.style.display = 'flex';
      appScreen.style.display = 'none';
    }
  });

  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    if(!email || !pass) return loginError.textContent = 'Please fill all fields.';
    
    loginBtn.textContent = 'Verifying...';
    loginError.textContent = '';
    
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      loginError.textContent = e.message.replace('Firebase:', '').trim();
    } finally {
      loginBtn.textContent = 'Secure Login';
    }
  });

  logoutBtn.addEventListener('click', async () => await signOut(auth));

  // ── DATA LOADING ──
  let personsData = {};
  let transactionsData = {};
  let dataLoaded = 0;

  function loadFinancialData() {
    dataLoaded = 0;
    onValue(ref(db, 'persons'), snap => { personsData = snap.val() || {}; dataLoaded++; if(dataLoaded >= 2) renderLedgers(); });
    onValue(ref(db, 'transactions'), snap => { transactionsData = snap.val() || {}; dataLoaded++; if(dataLoaded >= 2) renderLedgers(); });
  }

  function loadUsersData() {
    onValue(ref(db, 'users'), snap => {
      const usersData = snap.val() || {};
      renderUsers(usersData);
    });
  }

  // ── RENDER LEDGERS ──
  function renderLedgers() {
    const grid = document.getElementById('balancesGrid');
    const personKeys = Object.keys(personsData);
    if (personKeys.length === 0) { grid.innerHTML = '<div class="loader">No persons found.</div>'; return; }

    const ledger = {};
    personKeys.forEach(key => ledger[key] = { ...personsData[key], totalSent: 0, totalReceived: 0 });

    Object.values(transactionsData).forEach(tx => {
      const pKey = tx.personKey;
      if (ledger[pKey]) {
        if (tx.type === 'sent') ledger[pKey].totalSent += Number(tx.amount);
        else if (tx.type === 'received') ledger[pKey].totalReceived += Number(tx.amount);
      }
    });

    grid.innerHTML = personKeys.map(key => {
      const p = ledger[key];
      const initial = p.name ? p.name.charAt(0).toUpperCase() : '?';
      const netBalance = p.totalSent - p.totalReceived;
      
      let netClass = 'net-neutral', netText = 'Account Settled';
      if (netBalance > 0) { netClass = 'net-positive'; netText = 'Net Receivable'; }
      else if (netBalance < 0) { netClass = 'net-negative'; netText = 'Net Payable'; }

      return `
        <div class="card">
          <div class="person-header">
            <div class="avatar">${initial}</div>
            <div><div class="person-name">${p.name}</div><div class="person-contact">${p.contact}</div></div>
          </div>
          <div class="stats-row">
            <div class="stat-col"><span class="stat-label">Total Sent 📤</span><span class="stat-val-sent">₹${fmtNum(p.totalSent)}</span></div>
            <div class="stat-col" style="text-align: right;"><span class="stat-label">Total Received 📥</span><span class="stat-val-rec">₹${fmtNum(p.totalReceived)}</span></div>
          </div>
          <div class="net-balance ${netClass}"><div class="net-label">${netText}</div><div class="net-amount">₹${fmtNum(netBalance)}</div></div>
        </div>
      `;
    }).join('');
  }

  // ── RENDER USERS ──
  function renderUsers(usersData) {
    const grid = document.getElementById('usersGrid');
    const userKeys = Object.keys(usersData);
    
    if (userKeys.length === 0) {
      grid.innerHTML = '<div class="loader">No users found.</div>';
      return;
    }

    grid.innerHTML = userKeys.map(uid => {
      const u = usersData[uid];
      const isTargetAdmin = u.role === 'admin' || u.role === 'superadmin';
      const initial = u.name ? u.name.charAt(0).toUpperCase() : '?';
      
      // Handle Avatar
      const avatarHtml = u.photoURL 
        ? `<img src="${u.photoURL}" alt="Profile">` 
        : initial;

      // Handle Badge
      let badgeHtml = '<span class="badge badge-user">User</span>';
      if(u.role === 'superadmin') badgeHtml = '<span class="badge badge-super">⭐ Super Admin</span>';
      else if(u.role === 'admin') badgeHtml = '<span class="badge badge-admin">🛡️ Admin</span>';

      // Handle Impersonate Button
      let actionBtn = '';
      if (isSuperAdmin && auth.currentUser.email !== u.email) {
        actionBtn = `
          <div style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px;">
            <button class="btn btn-outline btn-sm" style="width:100%" onclick="impersonateUser('${u.email}', '${u.name}')">
               Visits as ${u.name.split(' ')[0]} 
            </button>
          </div>
        `;
      }

      return `
        <div class="card">
          <div class="person-header" style="margin-bottom: 0;">
            <div class="avatar">${avatarHtml}</div>
            <div>
              <div class="person-name">${u.name} ${badgeHtml}</div>
              <div class="person-contact">${u.email}</div>
            </div>
          </div>
          ${actionBtn}
        </div>
      `;
    }).join('');
  }
</script>
</body>
</html>
