<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USB Radar Web App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #000;
      color: #0f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
      background-color: #0f0;
      color: #000;
      border: none;
      border-radius: 5px;
    }

    #status {
      margin: 10px;
      font-size: 16px;
    }

    canvas {
      background: #111;
      border: 2px solid #0f0;
      margin-top: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <h1>Arduino USB Radar</h1>
  <button id="connectButton">Connect to Arduino</button>
  <p id="status">Status: Not connected</p>
  <canvas id="radarCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("radarCanvas");
    const ctx = canvas.getContext("2d");
    const centerX = canvas.width / 2;
    const centerY = canvas.height;
    let port, reader;
    let points = [];

    function drawRadar(angle, distance) {
      const radius = distance * 2; // scale for visibility
      const rad = (angle * Math.PI) / 180;
      const x = centerX + Math.cos(rad) * radius;
      const y = centerY - Math.sin(rad) * radius;

      // Store point
      points.push({ x, y, time: Date.now() });
      if (points.length > 200) points.shift(); // limit memory

      // Clear canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw sweeping arm
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(x, y);
      ctx.strokeStyle = "lime";
      ctx.lineWidth = 2;
      ctx.stroke();

      // Draw old points
      for (let point of points) {
        const age = Date.now() - point.time;
        const opacity = Math.max(1 - age / 2000, 0);
        ctx.beginPath();
        ctx.arc(point.x, point.y, 3, 0, 2 * Math.PI);
        ctx.fillStyle = `rgba(255, 0, 0, ${opacity})`;
        ctx.fill();
      }
    }

    document.getElementById("connectButton").addEventListener("click", async () => {
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        document.getElementById("status").textContent = "Status: Connected";

        const decoder = new TextDecoderStream();
        const inputDone = port.readable.pipeTo(decoder.writable);
        const inputStream = decoder.readable;
        const lineReader = inputStream
          .pipeThrough(new TransformStream({
            start() { this.buffer = ""; },
            transform(chunk, controller) {
              this.buffer += chunk;
              const lines = this.buffer.split("\n");
              this.buffer = lines.pop();
              lines.forEach(line => controller.enqueue(line));
            },
          }))
          .getReader();

        while (true) {
          const { value, done } = await lineReader.read();
          if (done) break;
          const data = value.trim();
          if (data.includes(",")) {
            const [angleStr, distanceStr] = data.split(",");
            const angle = parseInt(angleStr);
            const distance = parseInt(distanceStr);
            if (!isNaN(angle) && !isNaN(distance)) {
              drawRadar(angle, distance);
            }
          }
        }
      } catch (err) {
        console.error("Error:", err);
        document.getElementById("status").textContent = "Status: Error - " + err;
      }
    });
  </script>
</body>
</html>
